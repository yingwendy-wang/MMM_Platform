<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Place Report · Multi Modal Mobility</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body data-page="report">
<header class="site-header"><div class="container site-header-inner"><a class="brand" href="index.html"><span class="brand-mark">M</span><div><div>Multi Modal Mobility</div></div></a><nav class="nav"><a href="index.html" data-page="home">Home</a><a href="mobility.html" data-page="mobility">Mobility</a><a href="experience.html" data-page="experience">Experience</a><a href="networks.html" data-page="networks">Place Networks</a><a href="report.html" data-page="report">Place Report</a><a href="about.html" data-page="about">About</a></nav></div></header>
<main class="page page-wide">
  <div class="container wider report-shell-v3">
    <aside class="report-rail-v3">
      <section class="section-card report-rail-card report-controls-v3">
        <div class="control-box report-range-box-v3">
          <label>Start - End</label>
          <input id="report-start" type="date" placeholder="Start date">
          <input id="report-end" type="date" placeholder="End date">
        </div>
        <div class="control-box report-focal-control">
          <label>Focal Place</label>
          <div class="report-place-input-wrap">
            <input id="report-place-input" list="report-place-list" placeholder="Search or select a focal place" autocomplete="off" />
            <button id="report-place-clear" class="report-place-clear" type="button" aria-label="Clear focal place search" hidden>×</button>
          </div>
          <datalist id="report-place-list"></datalist>
          <select id="report-place" class="sr-only" aria-hidden="true" tabindex="-1"></select>
        </div>
        <div class="control-box"><label>Compare Places</label><input id="report-compare-input" list="report-compare-list" placeholder="Type to add a compare place"></div>
        <datalist id="report-compare-list"></datalist>
        <select id="report-compare" multiple size="8" class="sr-only"></select>
        <div id="report-compare-chips" class="compare-pills report-compare-chips"></div>
        <div class="report-actions-row-v3">
          <div class="export-menu-wrap report-action-grow"><button id="report-export-toggle" class="btn btn-primary report-action-grow">Export</button><div id="report-export-menu" class="export-menu hidden"><button id="report-export-pdf" class="export-option">PDF</button><button id="report-export-ppt" class="export-option">PPT</button></div></div>
          <button id="report-reset" class="btn btn-reset report-action-grow">Reset</button>
        </div>
      </section>
    </aside>

    <section id="report-main" class="report-main-v3">
      <section id="section-overview" data-section class="section-card report-hero-v3">
        <div class="eyebrow">Place Report</div>
        <h1 id="report-title"></h1>
        <p id="report-subtitle" class="report-hero-summary"></p>
        <div id="report-kpis" class="report-kpis-v3"></div>
        <div id="report-hero-compare-line" class="report-hero-compare-line hidden">
          <span class="report-hero-compare-label">Compare mode</span>
          <div id="report-hero-compare-chips" class="compare-pills"></div>
        </div>
      </section>

      <section id="section-visits" data-section class="section-card report-section-v3">
        <div class="report-section-head">
          <div class="report-section-title"><div class="report-section-label">VISITS</div><h2>Visit Trend</h2></div>
          <div class="report-scale-tabs" data-group="visits">
            <button class="scale-chip" data-scale="daily">Daily</button>
            <button class="scale-chip active" data-scale="weekly">Weekly</button>
            <button class="scale-chip" data-scale="monthly">Monthly</button>
          </div>
        </div>
        <div class="chart-shell report-chart-lg"><canvas id="report-visits-chart"></canvas></div>
        <div id="report-visits-note" class="note-inline"></div>
        <div id="report-visits-markets" class="report-card-grid"></div>
      </section>

      <section id="section-mobility" data-section class="section-card report-section-v3">
        <div class="report-section-head">
          <div class="report-section-title"><div class="report-section-label">MOBILITY</div><h2>Flow Trend</h2></div>
          <div class="report-scale-tabs" data-group="flow">
            <button class="scale-chip" data-scale="daily">Daily</button>
            <button class="scale-chip active" data-scale="weekly">Weekly</button>
            <button class="scale-chip" data-scale="monthly">Monthly</button>
          </div>
        </div>
        <div class="chart-shell report-chart-lg"><canvas id="report-flow-chart"></canvas></div>
        <div id="report-flow-note" class="note-inline"></div>
        <div id="report-mobility-inbound" class="report-card-grid"></div>
        <div id="report-mobility-outbound" class="report-card-grid report-grid-gap-top"></div>
      </section>

      <section id="section-experience" data-section class="section-card report-section-v3">
        <div class="report-section-head">
          <div class="report-section-title"><div class="report-section-label">EXPERIENCE</div><h2>Experience Trend</h2></div>
          <div class="report-scale-tabs" data-group="experience">
            <button class="scale-chip" data-scale="daily">Daily</button>
            <button class="scale-chip active" data-scale="weekly">Weekly</button>
            <button class="scale-chip" data-scale="monthly">Monthly</button>
          </div>
        </div>
        <div class="chart-shell report-chart-lg"><canvas id="report-experience-chart"></canvas></div>
        <div id="report-experience-note" class="note-inline"></div>
        <div id="report-experience-markets" class="report-card-grid"></div>
      </section>

      <section id="section-combinations" data-section class="section-card report-section-v3">
        <div class="report-section-head">
          <div class="report-section-title"><div class="report-section-label">PLACE COMBINATIONS</div><h2>Combination Quality</h2></div>
        </div>
        <div id="report-combinations-main" class="report-card-grid"></div>
        <div id="report-combinations-compare" class="report-card-grid report-grid-gap-top"></div>
      </section>

      <section id="section-compare" data-section class="section-card report-section-v3 hidden">
        <div class="report-section-head">
          <div class="report-section-title"><div class="report-section-label">OVERLAY COMPARISON</div><h2>Comparison</h2></div>
        </div>
        <div id="report-compare-table"></div>
      </section>

      <section id="section-takeaways" data-section class="section-card report-section-v3">
        <div class="report-section-head">
          <div class="report-section-title"><div class="report-section-label">TAKEAWAYS</div><h2>Key Takeaways</h2></div>
        </div>
        <div id="report-takeaways" class="report-takeaways-grid"></div>
      </section>
    </section>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script src="./assets/config.js"></script>
<script src="./assets/core.js"></script>
<script src="./assets/report.js"></script>
</body>
</html>
