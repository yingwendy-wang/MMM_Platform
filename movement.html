<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movement</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="./assets/css/styles.css" />
</head>
<body class="analysis-page">
<div class="page-shell">
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="./index.html">
        <div class="brand-text solo">
          <div class="brand-title" data-site-name>Multi Modal Mobility</div>
          <div class="brand-sub">Tourist mobility and experience intelligence</div>
        </div>
      </a>
      <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false">☰</button>
      <nav class="top-nav">
        <a href="./index.html" data-page="home">Home</a>
        <a href="./movement.html" data-page="movement">Movement</a>
        <a href="./sentiment.html" data-page="sentiment">Sentiment</a>
        <a href="./combinations.html" data-page="combinations">Combinations</a>
        <a href="./report.html" data-page="report">Report</a>
        <a href="./about.html" data-page="about">About</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <section class="analysis-layout">
      <div class="analysis-map">
        <div id="movement-map" class="map-canvas"></div>
      </div>
      <aside class="analysis-sidebar">
        <div class="sidebar-stack">
          <div class="sidebar-block">
            <div class="filter-bar">
              <div class="filter-field">
                <label>Start date</label>
                <input type="date" id="movement-start-date">
              </div>
              <div class="filter-field">
                <label>End date</label>
                <input type="date" id="movement-end-date">
              </div>
              <button class="button-secondary" id="movement-reset">Reset</button>
            </div>
            <div class="switch-row">
              <label for="movement-show-all">Show all places</label>
              <input type="checkbox" id="movement-show-all">
            </div>
            <div class="map-hint" style="margin-top:12px;">City overview is shown by default. <strong>Click a place on the map</strong> to switch the sidebar to place-level movement details.</div>
          </div>

          <div class="sidebar-block" id="movement-title-block"></div>
          <div class="sidebar-block" id="movement-module-overview"></div>
          <div class="sidebar-block" id="movement-module-inbound"></div>
          <div class="sidebar-block" id="movement-module-outbound"></div>
          <div class="sidebar-block" id="movement-module-connected"></div>
        </div>
      </aside>
    </section>
  </main>
</div>

<button id="chatbot-open" class="chatbot-button" aria-label="Open chatbot">✦</button>
<div id="chatbot-modal" class="chatbot-modal">
  <div class="chatbot-card">
    <div class="chatbot-header"><strong>Ask MMM</strong><button class="button-secondary" id="chatbot-close">Close</button></div>
    <div id="chatbot-frame-wrap" style="flex:1;"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module" src="./assets/js/movement.js"></script>
</body>
</html>
